services:
  # ── Django Backend (Web Service) ──────────────────────────────
  - type: web
    name: employee-directory-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: gunicorn core.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://employee-directory-ui.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: employee-directory-db
          property: connectionString

  # ── React Frontend (Static Site) ─────────────────────────────
  - type: web
    name: employee-directory-ui
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: "https://employee-directory-api.onrender.com/api"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: employee-directory-db
    databaseName: employee_directory
    user: empdir_user
    plan: free
